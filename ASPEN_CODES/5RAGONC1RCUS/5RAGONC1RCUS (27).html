<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>5RAGONC1RCUS Complex</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin:0; height:100%; background:#0a0710; }
    #app { position:fixed; inset:0; }
    .hud {
      position: fixed; left: 12px; bottom: 12px; padding: 8px 10px;
      font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #d9c7ff; background: rgba(30, 0, 50, .45); border: 1px solid #4e2b93; border-radius: 8px;
      backdrop-filter: blur(6px);
    }
    .hud b { color:#b488ff }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <div class="hud">5RAGONC1RCUS • <b>Complex King</b> · <span id="seedLabel"></span></div>

  <!-- Load Three.js & OrbitControls without modules -->
  <script src="https://unpkg.com/three@0.160.1/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.160.1/examples/js/controls/OrbitControls.js"></script>

  <script type="module">
    // === nomad.xdna (seed generator) ===
    function nomadXDNA(seedStr = "5RAGONC1RCUSI") {
      let h1 = 2166136261 >>> 0;
      for (let i = 0; i < seedStr.length; i++) {
        h1 ^= seedStr.charCodeAt(i);
        h1 = Math.imul(h1, 16777619);
      }
      let state = h1 >>> 0;
      const rand = () => {
        state ^= state << 13; state >>>= 0;
        state ^= state >> 17; state >>>= 0;
        state ^= state << 5;  state >>>= 0;
        return (state >>> 0) / 4294967296;
      };
      const randRange = (a, b) => a + (b - a) * rand();
      return { rand, randRange, seedStr };
    }

    // Colors
    const C = {
      bg: new THREE.Color("#0a0710"),
      neon: new THREE.Color("#8b5cf6"),
      neonHot: new THREE.Color("#b388ff"),
      glass: new THREE.Color("#a78bfa"),
      leaf: new THREE.Color("#5fffd0")
    };

    // Renderer
    const canvas = document.getElementById("app");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;

    // Scene + Camera
    const scene = new THREE.Scene();
    scene.background = C.bg;
    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(28, 18, 28);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const seed = nomadXDNA();
    document.getElementById("seedLabel").textContent = seed.seedStr;

    // Ground
    const g = new THREE.PlaneGeometry(400, 400);
    const m = new THREE.MeshStandardMaterial({ color: "#0f0a1a", roughness: 0.95 });
    const ground = new THREE.Mesh(g, m);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Lights
    scene.add(new THREE.HemisphereLight("#2a1b52", "#04030a", 0.55));
    const key = new THREE.SpotLight(C.neonHot, 4, 200, Math.PI / 5);
    key.position.set(0, 48, 0);
    key.castShadow = true;
    scene.add(key);

    // Core Tower
    const towerGeo = new THREE.ConeGeometry(5, 16, 64, 1, true);
    const towerMat = new THREE.MeshStandardMaterial({ color: "#1a0f2d", emissive: C.neon, emissiveIntensity: 0.7 });
    const tower = new THREE.Mesh(towerGeo, towerMat);
    tower.position.y = 8;
    scene.add(tower);

    // Simple neon pods
    for (let i = 0; i < 20; i++) {
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 16, 16),
        new THREE.MeshStandardMaterial({ color: C.glass, roughness: 0.15, emissive: C.neon.clone().multiplyScalar(0.05) })
      );
      const a = (i / 20) * Math.PI * 2;
      const r = 12;
      sphere.position.set(Math.cos(a) * r, 1, Math.sin(a) * r);
      scene.add(sphere);
    }

    // Animation loop
    function animate() {
      controls.update();
      tower.rotation.y += 0.003;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
