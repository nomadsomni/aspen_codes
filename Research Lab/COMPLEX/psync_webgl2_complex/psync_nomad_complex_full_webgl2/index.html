<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PSYNC / NOMAD Complex WebGL2 Graph</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #050509;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eee;
    }
    #glcanvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #hud {
      position: fixed;
      left: 16px;
      top: 16px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 6px;
      font-size: 11px;
      pointer-events: none;
      backdrop-filter: blur(10px);
    }
    #hud strong {
      color: #ff4b9a;
      letter-spacing: 0.04em;
    }
    #hud .dim {
      opacity: 0.7;
    }
  </style>
</head>
<body>
<canvas id="glcanvas"></canvas>
<div id="hud">
  <div><strong>PSYNC COMPLEX / NODE MAP</strong></div>
  <div class="dim">Drag: orbit · Wheel: zoom</div>
</div>

<script src="js/engine.js"></script>
</body>
</html>
