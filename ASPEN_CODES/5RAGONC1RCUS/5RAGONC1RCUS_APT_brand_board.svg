      .mono { font-family: "Consolas", "Courier New", monospace; fill: #d6d0c7; }
      .sans { font-family: Arial, Helvetica, sans-serif; fill: #e8e1d4; }
      .label { font-family: "Consolas", "Courier New", monospace; fill: #32e6d1; letter-spacing: 2px; font-size: 18px; }
      .hair { stroke: #3a3d46; stroke-width: 1; }
      .red { fill: #e3343f; }
      .gold { fill: #f2a93b; }
      .cyan { fill: #32e6d1; }
