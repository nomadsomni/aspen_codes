<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<title>Realistic Earth</title>
<style>
  html, body {
    margin:0;
    height:100%;
    background:#000;
    overflow:hidden;
  }
  canvas {
    width:100vw;
    height:100vh;
    display:block;
    touch-action:none;
  }
  .label {
    position:fixed;
    left:10px;
    bottom:10px;
    font:11px system-ui, -apple-system, sans-serif;
    color:#ccc;
    opacity:0.7;
    pointer-events:none;
  }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="label">
  Earth texture © Solar System Scope / NASA (CC BY 4.0)
</div>
<script>
(function(){
  const canvas = document.getElementById("gl");
  const gl = canvas.getContext("webgl2", {antialias:true});
  if(!gl){
    alert("WebGL2 not supported");
    return;
  }

  function resize(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.floor(canvas.clientWidth * dpr);
    const h = Math.floor(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0,0,w,h);
    }
  }
  window.addEventListener("resize", resize);
  resize();

  const vs = `#version 300 es
  layout(location=0) in vec3 aPos;
  layout(location=1) in vec3 aNor;
  layout(location=2) in vec2 aUV;

  uniform mat4 uProj;
  uniform mat4 uView;
  uniform mat4 uModel;

  out vec3 vNor;
  out vec3 vPos;
  out vec2 vUV;

  void main(){
    vec4 wp = uModel * vec4(aPos,1.0);
    vPos = wp.xyz;
    vNor = mat3(uModel) * aNor;
    vUV = aUV;
    gl_Position = uProj * uView * wp;
  }`;

  const fs = `#version 300 es
  precision highp float;

  in vec3 vNor;
  in vec3 vPos;
  in vec2 vUV;

  uniform vec3 uEye;
  uniform sampler2D uTex;

  out vec4 o;

  void main(){
    vec3 N = normalize(vNor);

    // Sample Earth day texture
    vec3 tex = texture(uTex, vec2(vUV.x, 1.0 - vUV.y)).rgb;

    // Simple physical-ish lighting
    vec3 L = normalize(vec3(0.7, 0.4, 0.2)); // sun direction
    float diff = max(dot(N, L), 0.0);

    vec3 V = normalize(uEye - vPos);
    vec3 H = normalize(L + V);
    float spec = pow(max(dot(N, H), 0.0), 64.0) * 0.35;

    // Hemisphere fill (soft ambient)
    vec3 sky = vec3(0.08, 0.15, 0.18);
    vec3 ground = vec3(0.01, 0.01, 0.015);
    float h = N.y * 0.5 + 0.5;
    vec3 hemi = mix(ground, sky, h);

    vec3 base = tex;
    // Optional subtle green tint – comment this line out if you want pure texture
    base *= vec3(0.9, 1.02, 0.9);

    vec3 col = base * (hemi*0.5 + diff*0.9) + spec;
    o = vec4(col, 1.0);
  }`;

  function compile(type,src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
      throw new Error("Shader compile error");
    }
    return s;
  }
  function createProgram(vsSrc, fsSrc){
    const p = gl.createProgram();
    gl.attachShader(p, compile(gl.VERTEX_SHADER, vsSrc));
    gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsSrc));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
      console.error(gl.getProgramInfoLog(p));
      throw new Error("Program link error");
    }
    return p;
  }

  const prog = createProgram(vs, fs);

  function sphere(radius, lat, lon){
    const pos=[], nor=[], uv=[], idx=[];
    for(let y=0;y<=lat;y++){
      const v = y/lat;
      const a1 = v * Math.PI;
      for(let x=0;x<=lon;x++){
        const u = x/lon;
        const a2 = u * Math.PI * 2.0;
        const sx = Math.sin(a1)*Math.cos(a2);
        const sy = Math.cos(a1);
        const sz = Math.sin(a1)*Math.sin(a2);
        pos.push(radius*sx, radius*sy, radius*sz);
        nor.push(sx, sy, sz);
        uv.push(u, v);
      }
    }
    for(let y=0;y<lat;y++){
      for(let x=0;x<lon;x++){
        const i = y*(lon+1)+x;
        idx.push(i, i+1, i+lon+1, i+1, i+lon+2, i+lon+1);
      }
    }
    return {
      pos:new Float32Array(pos),
      nor:new Float32Array(nor),
      uv:new Float32Array(uv),
      idx:new Uint32Array(idx)
    };
  }

  const mesh = sphere(3.0, 64, 96);

  const vao = gl.createVertexArray();
  gl.bindVertexArray(vao);

  function attribBuffer(data, loc, size){
    const b = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, b);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, size, gl.FLOAT, false, 0, 0);
  }

  attribBuffer(mesh.pos, 0, 3);
  attribBuffer(mesh.nor, 1, 3);
  attribBuffer(mesh.uv, 2, 2);

  const ib = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ib);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, mesh.idx, gl.STATIC_DRAW);
  gl.bindVertexArray(null);

  // Texture loading (Earth daymap)
  const tex = gl.createTexture();
  let texReady = false;
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = function(){
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGB, gl.RGB, gl.UNSIGNED_BYTE, img);
    gl.generateMipmap(gl.TEXTURE_2D);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    texReady = true;
  };
  img.src = "https://upload.wikimedia.org/wikipedia/commons/8/80/Solarsystemscope_texture_8k_earth_daymap.jpg";

  // Math helpers
  function perspective(fovy, aspect, near, far){
    const f = 1/Math.tan(fovy/2);
    const nf = 1/(near - far);
    return [
      f/aspect,0,0,0,
      0,f,0,0,
      0,0,(far+near)*nf,-1,
      0,0,(2*far*near)*nf,0
    ];
  }
  const sub = (a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
  const cross=(a,b)=>[a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
  const dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
  const norm=a=>{const l=Math.hypot(a[0],a[1],a[2])||1;return[a[0]/l,a[1]/l,a[2]/l];};
  function lookAt(e,c,u){
    const z = norm(sub(e,c));
    const x = norm(cross(u,z));
    const y = cross(z,x);
    return [
      x[0],y[0],z[0],0,
      x[1],y[1],z[1],0,
      x[2],y[2],z[2],0,
      -dot(x,e),-dot(y,e),-dot(z,e),1
    ];
  }
  function rotY(a){
    const c=Math.cos(a), s=Math.sin(a);
    return [c,0,-s,0, 0,1,0,0, s,0,c,0, 0,0,0,1];
  }

  function mul(a,b){
    const o=new Array(16);
    for(let r=0;r<4;r++){
      for(let c=0;c<4;c++){
        o[r*4+c]=
          a[r*4+0]*b[0*4+c]+
          a[r*4+1]*b[1*4+c]+
          a[r*4+2]*b[2*4+c]+
          a[r*4+3]*b[3*4+c];
      }
    }
    return o;
  }

  gl.enable(gl.DEPTH_TEST);
  gl.clearColor(0,0,0,1);

  const loc = {
    uProj: gl.getUniformLocation(prog,"uProj"),
    uView: gl.getUniformLocation(prog,"uView"),
    uModel: gl.getUniformLocation(prog,"uModel"),
    uEye: gl.getUniformLocation(prog,"uEye"),
    uTex: gl.getUniformLocation(prog,"uTex")
  };

  let start = performance.now();
  function frame(now){
    resize();
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    if(!texReady){
      requestAnimationFrame(frame);
      return;
    }

    const t = (now - start) * 0.001;

    const aspect = canvas.width / canvas.height;
    const proj = perspective(55*Math.PI/180, aspect, 0.1, 1000.0);

    // Camera slowly moves, Earth stays in center
    const rCam = 10.0;
    const eye = [
      Math.cos(t*0.15) * rCam,
      3.0 + Math.sin(t*0.25)*0.7,
      Math.sin(t*0.15) * rCam
    ];
    const center = [0,0,0];
    const up = [0,1,0];
    const view = lookAt(eye, center, up);

    // Earth rotation + gentle float
    const spin = rotY(t * 0.4);
    spin[13] = Math.sin(t*0.6)*0.3; // vertical bob

    gl.useProgram(prog);
    gl.bindVertexArray(vao);

    gl.uniformMatrix4fv(loc.uProj,false,proj);
    gl.uniformMatrix4fv(loc.uView,false,view);
    gl.uniformMatrix4fv(loc.uModel,false,spin);
    gl.uniform3f(loc.uEye, eye[0], eye[1], eye[2]);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.uniform1i(loc.uTex, 0);

    gl.drawElements(gl.TRIANGLES, mesh.idx.length, gl.UNSIGNED_INT, 0);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
