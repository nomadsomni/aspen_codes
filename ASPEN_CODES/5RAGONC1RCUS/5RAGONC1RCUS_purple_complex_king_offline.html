<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>5RAGON5C1RCUS WebGL2 Offline</title>
<style>
  body { margin:0; overflow:hidden; background:#111; }
  canvas { display:block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
<script>
if (!WEBGL.isWebGL2Available()) alert("WebGL2 not supported!");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 25, 40);
camera.lookAt(0,0,0);

// Renderer using WebGL2
const canvas = document.createElement('canvas');
const context = canvas.getContext('webgl2', { antialias:true });
const renderer = new THREE.WebGLRenderer({ canvas: canvas, context: context, antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lights
scene.add(new THREE.AmbientLight(0xffffff,0.5));
const dirLight = new THREE.DirectionalLight(0xffaa88, 0.8);
dirLight.position.set(20, 30, 20);
scene.add(dirLight);

// Hex floor
const hexGroup = new THREE.Group();
const hexRadius = 2;
const hexGeom = new THREE.CylinderGeometry(hexRadius, hexRadius, 0.2, 6);
const hexMat = new THREE.MeshStandardMaterial({color:0x222222, metalness:0.3, roughness:0.7});
const floorRadius = 10;

for(let q=-floorRadius;q<=floorRadius;q++){
  for(let r=-floorRadius;r<=floorRadius;r++){
    const hex = new THREE.Mesh(hexGeom, hexMat);
    const x = hexRadius * Math.sqrt(3) * (q + r/2);
    const z = hexRadius * 1.5 * r;
    hex.position.set(x,0,z);
    hex.rotation.y = Math.PI/6;
    hexGroup.add(hex);
  }
}
scene.add(hexGroup);

// Circular rain
const rainCount = 300;
const rainGeom = new THREE.BufferGeometry();
const rainPositions = [];
for(let i=0;i<rainCount;i++){
  const radius = Math.random()*15;
  const angle = Math.random()*Math.PI*2;
  const y = Math.random()*15 + 5;
  rainPositions.push(Math.cos(angle)*radius, y, Math.sin(angle)*radius);
}
rainGeom.setAttribute('position', new THREE.Float32BufferAttribute(rainPositions,3));
const rainMat = new THREE.PointsMaterial({color:0x99ddff, size:0.2});
const rain = new THREE.Points(rainGeom, rainMat);
scene.add(rain);

// Animation
function animate(){
  requestAnimationFrame(animate);
  const pos = rain.geometry.attributes.position.array;
  for(let i=1;i<pos.length;i+=3){
    pos[i]-=0.3;
    if(pos[i]<0) pos[i] = Math.random()*15 + 5;
  }
  rain.geometry.attributes.position.needsUpdate=true;
  controls.update();
  renderer.render(scene,camera);
}
animate();

// Resize
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/WebGL.js"></script>
</body>
</html>
