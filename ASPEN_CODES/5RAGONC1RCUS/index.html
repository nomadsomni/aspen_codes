<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>5RAGONC1RCUS — Complex King Architecture Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin:0; height:100%; background:#0a0710; }
    #app { position:fixed; inset:0; }
    .hud {
      position: fixed; left: 12px; bottom: 12px; padding: 8px 10px;
      font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #d9c7ff; background: rgba(30, 0, 50, .45); border: 1px solid #4e2b93; border-radius: 8px;
      backdrop-filter: blur(6px);
    }
    .hud b { color:#b488ff }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <div class="hud">5RAGONC1RCUS • <b>Complex King</b> · <span id="seedLabel"></span></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.1/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.1/examples/jsm/controls/OrbitControls.js";

    // -----------------------------
    // nomad.xdna — deterministic seed & helpers
    // -----------------------------
    function nomadXDNA(seedStr = "5RAGONC1RCUSI.minimosaic.nomad.xdna.avalanche.oasis.machinima") {
      let h1 = 2166136261 >>> 0;
      for (let i = 0; i < seedStr.length; i++) {
        h1 ^= seedStr.charCodeAt(i);
        h1 = Math.imul(h1, 16777619);
      }
      let state = h1 >>> 0;
      const rand = () => {
        // xorshift32
        state ^= state << 13; state >>>= 0;
        state ^= state >> 17; state >>>= 0;
        state ^= state << 5;  state >>>= 0;
        return (state >>> 0) / 4294967296;
      };
      const randRange = (a, b) => a + (b - a) * rand();
      return { rand, randRange, seedStr };
    }

    // Colors (purple cyber‑oasis)
    const C = {
      bg:   new THREE.Color("#0a0710"),
      neon: new THREE.Color("#8b5cf6"),
      neonHot: new THREE.Color("#b388ff"),
      glass: new THREE.Color("#a78bfa"),
      leaf: new THREE.Color("#5fffd0")
    };

    // Scene boot
    const canvas = document.getElementById("app");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(C.bg, 40, 220);
    scene.background = C.bg;

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(28, 18, 28);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const seed = nomadXDNA(); // you can change the seed string above
    document.getElementById("seedLabel").textContent = "seed: " + seed.seedStr.slice(0, 16) + "…";

    // -----------------------------
    // x.metaverse — lights & world root
    // -----------------------------
    const world = new THREE.Group(); scene.add(world);

    // Ground (dark velvet with subtle grid)
    const ground = (() => {
      const size = 400, div = 100;
      const g = new THREE.PlaneGeometry(size, size, div, div);
      const m = new THREE.MeshStandardMaterial({
        color: "#0f0a1a",
        roughness: 0.95,
        metalness: 0.05
      });
      const mesh = new THREE.Mesh(g, m);
      mesh.rotation.x = -Math.PI / 2;
      mesh.receiveShadow = true;
      world.add(mesh);
      // Neon grid lines
      const grid = new THREE.GridHelper(size, div, C.neonHot, new THREE.Color("#2b1b4e"));
      grid.position.y = 0.01;
      world.add(grid);
      return mesh;
    })();

    // Lighting
    const hemi = new THREE.HemisphereLight("#2a1b52", "#04030a", 0.55);
    scene.add(hemi);
    const key = new THREE.SpotLight(C.neonHot, 6.5, 200, Math.PI/5, 0.3, 1.2);
    key.position.set(0, 48, 0);
    key.target.position.set(0, 0, 0);
    key.castShadow = true;
    scene.add(key, key.target);

    // -----------------------------
    // ComplexKing — crowned core tower
    // -----------------------------
    function ComplexKing() {
      const g = new THREE.ConeGeometry(5, 16, 64, 1, true);
      const m = new THREE.MeshStandardMaterial({
        color: "#1a0f2d",
        emissive: C.neon.clone().multiplyScalar(0.6),
        emissiveIntensity: 0.7,
        metalness: 0.6,
        roughness: 0.25,
        side: THREE.DoubleSide
      });
      const tower = new THREE.Mesh(g, m);
      tower.position.y = 8;
      tower.castShadow = true;

      // Crown ring
      const crown = new THREE.TorusGeometry(2.2, 0.12, 16, 100);
      const cm = new THREE.MeshStandardMaterial({ color: "#29114d", emissive: C.neonHot, emissiveIntensity: 1.2, metalness: 0.9, roughness: 0.2 });
      const ring = new THREE.Mesh(crown, cm);
      ring.position.y = 16.2;

      // Crown spikes
      const spikes = new THREE.Group();
      for (let i = 0; i < 6; i++) {
        const sg = new THREE.ConeGeometry(0.28, 1.2, 16);
        const sm = new THREE.MeshStandardMaterial({ color: "#3b1a6a", emissive: C.neonHot, emissiveIntensity: 0.9 });
        const s = new THREE.Mesh(sg, sm);
        const a = (i / 6) * Math.PI * 2;
        s.position.set(Math.cos(a) * 2.2, 16.9, Math.sin(a) * 2.2);
        s.rotation.z = -Math.PI / 2;
        spikes.add(s);
      }

      const base = new THREE.CylinderGeometry(6.5, 7.2, 2.2, 64);
      const bm = new THREE.MeshStandardMaterial({ color: "#12081f", metalness: 0.6, roughness: 0.35, emissive: C.neon.clone().multiplyScalar(0.25) });
      const pedestal = new THREE.Mesh(base, bm);
      pedestal.castShadow = true;
      pedestal.receiveShadow = true;

      const group = new THREE.Group();
      group.add(pedestal, tower, ring, spikes);
      return group;
    }

    // -----------------------------
    // x.minimosaic — fractal tile plaza (hex instancing)
    // -----------------------------
    function xMinimosaic(radius = 7) {
      const hex = new THREE.CircleGeometry(1, 6);
      hex.rotateZ(Math.PI / 6);
      const m = new THREE.MeshStandardMaterial({
        color: "#130a23",
        metalness: 0.7,
        roughness: 0.35,
        emissive: C.neon.clone().multiplyScalar(0.15)
      });
      const count = (radius*2+1)**2;
      const inst = new THREE.InstancedMesh(hex, m, count);
      inst.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

      const tmp = new THREE.Object3D();
      let id = 0;
      const s = 1.05;
      for (let q = -radius; q <= radius; q++) {
        const r1 = Math.max(-radius, -q - radius);
        const r2 = Math.min(radius, -q + radius);
        for (let r = r1; r <= r2; r++) {
          const x = s * (Math.sqrt(3) * q + Math.sqrt(3)/2 * r);
          const z = s * (3/2 * r);
          tmp.position.set(x, 0.02, z);
          const scale = 0.85 + seed.rand() * 0.2;
          tmp.scale.set(scale, scale, scale);
          tmp.updateMatrix();
          inst.setMatrixAt(id++, tmp.matrix);
        }
      }
      inst.castShadow = false;
      inst.receiveShadow = true;
      return inst;
    }

    // -----------------------------
    // x.oasis — glass pods with neon saplings (instanced)
    // -----------------------------
    function xOasis(rings = 2) {
      const group = new THREE.Group();
      const podGeo = new THREE.SphereGeometry(1.2, 22, 22);
      const glassM = new THREE.MeshPhysicalMaterial({
        color: C.glass,
        roughness: 0.15,
        transmission: 0.8,
        thickness: 0.35,
        metalness: 0.1,
        emissive: C.neon.clone().multiplyScalar(0.05)
      });

      for (let i = 1; i <= rings; i++) {
        const count = 6 * i;
        const rad = 9 + i * 3.5;
        for (let j = 0; j < count; j++) {
          const a = (j / count) * Math.PI * 2 + seed.randRange(-0.05, 0.05);
          const mesh = new THREE.Mesh(podGeo, glassM);
          mesh.position.set(Math.cos(a) * rad, 0.9, Math.sin(a) * rad);
          mesh.castShadow = true;
          group.add(mesh);

          // Neon sapling (simple line)
          const pts = [new THREE.Vector3(0,0,0), new THREE.Vector3(0.2,0.6,0), new THREE.Vector3(-0.1,1.0,0.1)];
          const geo = new THREE.BufferGeometry().setFromPoints(pts);
          const mat = new THREE.LineBasicMaterial({ color: C.leaf, linewidth: 2 });
          const line = new THREE.Line(geo, mat);
          line.position.copy(mesh.position).add(new THREE.Vector3(0, 0.1, 0));
          group.add(line);
        }
      }
      return group;
    }

    // -----------------------------
    // x.avalanche — data‑falls (GPU points)
    // -----------------------------
    function xAvalanche(streams = 5) {
      const group = new THREE.Group();
      for (let s = 0; s < streams; s++) {
        const count = 1000;
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        const vel = new Float32Array(count);
        const radius = 12 + seed.rand() * 10;
        for (let i = 0; i < count; i++) {
          const a = seed.rand() * Math.PI * 2;
          const r = radius + seed.rand() * 3;
          pos[i*3+0] = Math.cos(a) * r;
          pos[i*3+1] = seed.rand() * 18 + 6;
          pos[i*3+2] = Math.sin(a) * r;
          vel[i] = 0.03 + seed.rand() * 0.06;
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('velocity', new THREE.BufferAttribute(vel, 1));
        const mat = new THREE.PointsMaterial({ size: 0.06, color: C.neonHot, transparent: true, opacity: 0.95 });
        const points = new THREE.Points(geo, mat);
        points.userData.radius = radius;
        group.add(points);
      }
      // update function
      group.userData.update = (dt) => {
        group.children.forEach(points => {
          const pos = points.geometry.attributes.position.array;
          const vel = points.geometry.attributes.velocity.array;
          for (let i = 0; i < vel.length; i++) {
            pos[i*3+1] -= vel[i] * dt * 60;
            if (pos[i*3+1] < 0.05) pos[i*3+1] = 20 + seed.rand() * 10;
          }
          points.geometry.attributes.position.needsUpdate = true;
        });
      };
      return group;
    }

    // -----------------------------
    // x.machinima — camera rail + shots
    // -----------------------------
    function xMachinima() {
      const rail = new THREE.CatmullRomCurve3([
        new THREE.Vector3(26, 10,  0),
        new THREE.Vector3( 0, 16, 26),
        new THREE.Vector3(-24, 12,  0),
        new THREE.Vector3( 0, 14,-24),
        new THREE.Vector3(26, 10,  0),
      ], true, "catmullrom", 0.1);

      const helperGeo = new THREE.TubeGeometry(rail, 200, 0.02, 8, true);
      const helper = new THREE.Mesh(helperGeo, new THREE.MeshBasicMaterial({ color: "#3d2a78", transparent:true, opacity:0.25 }));
      helper.visible = false; // toggle to visualize path
      world.add(helper);

      return {
        progress: 0,
        update(dt) {
          this.progress = (this.progress + dt * 0.02) % 1;
          const t = this.progress;
          const p = rail.getPointAt(t);
          const look = new THREE.Vector3(0, 8, 0);
          camera.position.lerp(p, 0.08);
          camera.lookAt(look);
        }
      };
    }

    // -----------------------------
    // Assemble the complex
    // -----------------------------
    const core = ComplexKing(); world.add(core);
    const plaza = xMinimosaic(9); world.add(plaza);
    const oases = xOasis(3); world.add(oases);
    const avalanches = xAvalanche(6); world.add(avalanches);
    const cinema = xMachinima();

    // Soft ring lights around the core (accent)
    for (let i = 0; i < 4; i++) {
      const l = new THREE.PointLight(C.neonHot, 1.5, 40, 2);
      const a = (i/4)*Math.PI*2;
      l.position.set(Math.cos(a)*10, 6 + i*1.2, Math.sin(a)*10);
      l.castShadow = true;
      world.add(l);
    }

    // Responsive
    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // -----------------------------
    // Main loop
    // -----------------------------
    let last = performance.now();
    function tick(now = performance.now()) {
      const dt = (now - last) / 1000; last = now;
      controls.update();
      avalanches.userData.update?.(dt);
      cinema.update(dt);
      // Subtle neon pulse
      const pulse = 0.5 + 0.5 * Math.sin(now * 0.0018);
      core.children.forEach(c => {
        if (c.material && c.material.emissive) c.material.emissiveIntensity = 0.5 + pulse*0.8;
      });
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
