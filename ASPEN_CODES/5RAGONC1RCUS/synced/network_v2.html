<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>5RAGONC1RCUS - Network WebGL v2</title>
<style>
  html, body { margin:0; height:100%; background:#0a0710; }
  canvas { width:100vw; height:100vh; display:block; }
  .hud {
    position: fixed; left: 12px; bottom: 12px; padding: 8px 10px;
    font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: #d9c7ff; background: rgba(30,0,50,.45); border: 1px solid #4e2b93; border-radius: 8px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    user-select: none;
  }
  .hud b { color:#b488ff }
  .hud .keys { opacity:.8 }
  .warn { position: fixed; left: 12px; top: 12px; color:#ffb4e6; font: 12px/1.4 system-ui; opacity:0.85 }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="hud">
  5RAGONC1RCUS - <b>Network Model v2</b> - offline WebGL2
  <div class="keys">[SPACE] toggle camera rail - Drag to orbit - Scroll to zoom</div>
  <div class="keys" id="status">STATUS: syncing...</div>
</div>
<div class="warn" id="warn"></div>
<script>
(function(){
  const canvas = document.getElementById('gl');
  const gl = canvas.getContext('webgl2', { antialias:true, alpha:false });
  if(!gl){
    document.getElementById('warn').textContent = 'WebGL2 not available in this browser.';
    return;
  }

  function resize(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.floor(canvas.clientWidth * dpr);
    const h = Math.floor(canvas.clientHeight * dpr);
    if(canvas.width !== w || canvas.height !== h){
      canvas.width = w; canvas.height = h;
      gl.viewport(0,0,w,h);
    }
  }
  window.addEventListener('resize', resize);
  resize();

  const V3 = {
    add:(a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]],
    sub:(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],
    mul:(a,s)=>[a[0]*s,a[1]*s,a[2]*s],
    dot:(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2],
    norm:(a)=>{const l=Math.hypot(a[0],a[1],a[2])||1;return [a[0]/l,a[1]/l,a[2]/l];}
  };
  function mat4Perspective(fovy, aspect, near, far){
    const f = 1/Math.tan(fovy/2); const nf = 1/(near - far);
    return [f/aspect,0,0,0, 0,f,0,0, 0,0,(far+near)*nf,-1, 0,0,(2*far*near)*nf,0];
  }
  function mat4LookAt(eye,center,up){
    const z = V3.norm(V3.sub(eye,center));
    const x = V3.norm([up[1]*z[2]-up[2]*z[1], up[2]*z[0]-up[0]*z[2], up[0]*z[1]-up[1]*z[0]]);
    const y = [z[1]*x[2]-z[2]*x[1], z[2]*x[0]-z[0]*x[2], z[0]*x[1]-z[1]*x[0]];
    return [x[0],y[0],z[0],0, x[1],y[1],z[1],0, x[2],y[2],z[2],0,
            -V3.dot(x,eye),-V3.dot(y,eye),-V3.dot(z,eye),1];
  }

  function compile(type, src){
    const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
      throw new Error(gl.getShaderInfoLog(s));
    }
    return s;
  }
  function program(vs,fs){
    const p=gl.createProgram();
    gl.attachShader(p, compile(gl.VERTEX_SHADER, vs));
    gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(p);
    if(!gl.getProgramParameter(p, gl.LINK_STATUS)){
      throw new Error(gl.getProgramInfoLog(p));
    }
    return p;
  }

  const vsLine = `#version 300 es
  layout(location=0) in vec3 aPos;
  uniform mat4 uProj, uView;
  void main(){ gl_Position = uProj * uView * vec4(aPos,1.0); }`;
  const fsLine = `#version 300 es
  precision highp float;
  out vec4 o;
  uniform vec3 uColor;
  uniform float uAlpha;
  void main(){ o = vec4(uColor, uAlpha); }`;

  const vsNode = `#version 300 es
  layout(location=0) in vec3 aPos;
  layout(location=1) in float aGlow;
  uniform mat4 uProj, uView;
  uniform float uTime;
  out float vGlow;
  void main(){
    float pulse = 0.7 + 0.3 * sin(uTime*1.6 + aGlow*6.283);
    vec3 p = aPos + vec3(0.0, 0.18*sin(uTime*0.9 + aGlow*8.0), 0.0);
    gl_Position = uProj * uView * vec4(p, 1.0);
    gl_PointSize = 6.0 + 6.0 * pulse;
    vGlow = pulse;
  }`;
  const fsNode = `#version 300 es
  precision highp float;
  in float vGlow;
  out vec4 o;
  void main(){
    vec2 uv = gl_PointCoord - vec2(0.5);
    float d = length(uv);
    float a = smoothstep(0.5, 0.15, d);
    vec3 col = mix(vec3(0.27,0.16,0.45), vec3(0.75,0.56,1.0), vGlow);
    o = vec4(col, a);
  }`;

  const vsFlow = `#version 300 es
  layout(location=0) in vec3 aStart;
  layout(location=1) in vec3 aEnd;
  layout(location=2) in float aSeed;
  layout(location=3) in float aRate;
  uniform mat4 uProj, uView;
  uniform float uTime;
  uniform float uSync;
  out float vAlpha;
  void main(){
    float t = fract(uTime * aRate + aSeed + uSync);
    vec3 p = mix(aStart, aEnd, t);
    gl_Position = uProj * uView * vec4(p, 1.0);
    gl_PointSize = 2.5;
    float head = smoothstep(0.0, 0.15, t);
    float tail = 1.0 - smoothstep(0.7, 1.0, t);
    vAlpha = head * tail;
  }`;
  const fsFlow = `#version 300 es
  precision highp float;
  in float vAlpha;
  out vec4 o;
  void main(){
    float d = length(gl_PointCoord - vec2(0.5));
    float a = smoothstep(0.5, 0.2, d) * vAlpha;
    o = vec4(0.72, 0.55, 1.0, a);
  }`;

  const progLine = program(vsLine, fsLine);
  const progNode = program(vsNode, fsNode);
  const progFlow = program(vsFlow, fsFlow);

  function makeLines(positions){
    const vao=gl.createVertexArray(); gl.bindVertexArray(vao);
    const vbo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
    gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0,3,gl.FLOAT,false,0,0);
    gl.bindVertexArray(null);
    return { vao, count: positions.length/3 };
  }
  function makeNodes(positions, glow){
    const vao=gl.createVertexArray(); gl.bindVertexArray(vao);
    const vbo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
    gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0,3,gl.FLOAT,false,0,0);
    const gbo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, gbo);
    gl.bufferData(gl.ARRAY_BUFFER, glow, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(1);
    gl.vertexAttribPointer(1,1,gl.FLOAT,false,0,0);
    gl.bindVertexArray(null);
    return { vao, count: positions.length/3 };
  }
  function makeFlows(starts, ends, seeds, rates){
    const vao=gl.createVertexArray(); gl.bindVertexArray(vao);
    const sbo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, sbo);
    gl.bufferData(gl.ARRAY_BUFFER, starts, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0,3,gl.FLOAT,false,0,0);
    const ebo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, ebo);
    gl.bufferData(gl.ARRAY_BUFFER, ends, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(1);
    gl.vertexAttribPointer(1,3,gl.FLOAT,false,0,0);
    const fbo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, fbo);
    gl.bufferData(gl.ARRAY_BUFFER, seeds, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(2);
    gl.vertexAttribPointer(2,1,gl.FLOAT,false,0,0);
    const rbo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, rbo);
    gl.bufferData(gl.ARRAY_BUFFER, rates, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(3);
    gl.vertexAttribPointer(3,1,gl.FLOAT,false,0,0);
    gl.bindVertexArray(null);
    return { vao, count: seeds.length };
  }

  // Build network layout (clustered rings)
  const nodes = [];
  const rings = [6, 10, 14, 18];
  for(let r=0;r<rings.length;r++){
    const count = rings[r];
    const rad = 6 + r*5.5;
    for(let i=0;i<count;i++){
      const a = i/count * Math.PI*2 + r*0.15;
      const y = (r-1.5) * 2.3 + Math.sin(a*3.0)*0.6;
      nodes.push([Math.cos(a)*rad, y, Math.sin(a)*rad]);
    }
  }
  for(let i=0;i<12;i++){
    const a = i/12*Math.PI*2;
    nodes.push([Math.cos(a)*2.2, Math.sin(a*2.0)*1.2, Math.sin(a)*2.2]);
  }

  // Connect edges: nearest neighbors (optimized)
  const edges = [];
  for(let i=0;i<nodes.length;i++){
    const dists = [];
    for(let j=0;j<nodes.length;j++){
      if(i===j) continue;
      const a = nodes[i], b = nodes[j];
      const d = Math.hypot(a[0]-b[0], a[1]-b[1], a[2]-b[2]);
      dists.push({j, d});
    }
    dists.sort((x,y)=>x.d-y.d);
    const k = 3;
    for(let n=0;n<k;n++){
      const j = dists[n].j;
      if(i < j) edges.push([i,j]);
    }
  }

  const linePos = new Float32Array(edges.length * 2 * 3);
  let lp=0;
  for(const [i,j] of edges){
    const a = nodes[i], b = nodes[j];
    linePos[lp++] = a[0]; linePos[lp++] = a[1]; linePos[lp++] = a[2];
    linePos[lp++] = b[0]; linePos[lp++] = b[1]; linePos[lp++] = b[2];
  }

  const nodePos = new Float32Array(nodes.length * 3);
  const nodeGlow = new Float32Array(nodes.length);
  for(let i=0;i<nodes.length;i++){
    const p = nodes[i];
    nodePos[i*3+0]=p[0]; nodePos[i*3+1]=p[1]; nodePos[i*3+2]=p[2];
    nodeGlow[i] = Math.random();
  }

  // Flow particles along edges (optimized traffic)
  const flowPerEdge = 3;
  const flowCount = edges.length * flowPerEdge;
  const flowStarts = new Float32Array(flowCount * 3);
  const flowEnds = new Float32Array(flowCount * 3);
  const flowSeeds = new Float32Array(flowCount);
  const flowRates = new Float32Array(flowCount);
  const edgeRates = new Float32Array(edges.length);
  let fp=0;
  for(let e=0;e<edges.length;e++){
    const [i,j] = edges[e];
    const a = nodes[i], b = nodes[j];
    const len = Math.hypot(a[0]-b[0], a[1]-b[1], a[2]-b[2]);
    const rate = 0.18 + (1.0 / (0.6 + len)) * 0.28;
    edgeRates[e] = rate;
    for(let k=0;k<flowPerEdge;k++){
      flowStarts[fp*3+0]=a[0]; flowStarts[fp*3+1]=a[1]; flowStarts[fp*3+2]=a[2];
      flowEnds[fp*3+0]=b[0]; flowEnds[fp*3+1]=b[1]; flowEnds[fp*3+2]=b[2];
      flowSeeds[fp] = Math.random();
      flowRates[fp] = rate;
      fp++;
    }
  }

  const lines = makeLines(linePos);
  const nodesMesh = makeNodes(nodePos, nodeGlow);
  const flows = makeFlows(flowStarts, flowEnds, flowSeeds, flowRates);

  gl.enable(gl.DEPTH_TEST);
  gl.clearColor(0.039,0.027,0.063,1);

  let yaw = 0.7, pitch = 0.35, dist = 42;
  let isDown=false, px=0, py=0;
  let autoCam = true;
  canvas.addEventListener('mousedown', e=>{ isDown=true; px=e.clientX; py=e.clientY; });
  window.addEventListener('mouseup', ()=>{ isDown=false; });
  window.addEventListener('mousemove', e=>{
    if(!isDown) return;
    autoCam = false;
    const dx=(e.clientX-px)/canvas.clientWidth;
    const dy=(e.clientY-py)/canvas.clientHeight;
    yaw -= dx*3.0; pitch -= dy*2.0;
    pitch = Math.max(-1.2, Math.min(1.2, pitch));
    px=e.clientX; py=e.clientY;
  }, {passive:true});
  canvas.addEventListener('wheel', e=>{
    dist *= (1 + Math.sign(e.deltaY)*0.06);
    dist = Math.max(10, Math.min(120, dist));
    e.preventDefault();
  }, {passive:false});
  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space'){ autoCam = !autoCam; e.preventDefault(); }
  });

  function getEye(t){
    if(!autoCam) {
      const cx=0, cy=2, cz=0;
      const ex = cx + dist*Math.cos(pitch)*Math.cos(yaw);
      const ey = cy + dist*Math.sin(pitch);
      const ez = cz + dist*Math.cos(pitch)*Math.sin(yaw);
      return [ex,ey,ez];
    }
    const k = t*0.15;
    const r = 34 + 5*Math.sin(k*1.4);
    const h = 6 + 4*Math.sin(k*1.1 + 0.8);
    return [Math.cos(k)*r, h, Math.sin(k)*r];
  }

  function setMat(p, name, m){ gl.uniformMatrix4fv(gl.getUniformLocation(p,name), false, m); }
  function setVec3(p, name, v){ gl.uniform3f(gl.getUniformLocation(p,name), v[0],v[1],v[2]); }
  function setF(p, name, v){ gl.uniform1f(gl.getUniformLocation(p,name), v); }

  const statusEl = document.getElementById('status');
  let start = performance.now();
  function frame(now){
    resize();
    const t = (now - start) * 0.001;

    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    const aspect = canvas.width / canvas.height;
    const proj = mat4Perspective(55*Math.PI/180, aspect, 0.1, 1000);
    const eye = getEye(t);
    const view = mat4LookAt(eye, [0,2,0], [0,1,0]);

    const sync = Math.sin(t * 0.9) * 0.5 + 0.5;

    // Lines (synchronized intensity)
    gl.useProgram(progLine);
    setMat(progLine, 'uProj', proj);
    setMat(progLine, 'uView', view);
    setVec3(progLine, 'uColor', [0.33, 0.22, 0.62]);
    setF(progLine, 'uAlpha', 0.30 + 0.20 * sync);
    gl.bindVertexArray(lines.vao);
    gl.drawArrays(gl.LINES, 0, lines.count);

    // Flow particles
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
    gl.useProgram(progFlow);
    setMat(progFlow, 'uProj', proj);
    setMat(progFlow, 'uView', view);
    setF(progFlow, 'uTime', t);
    setF(progFlow, 'uSync', sync * 0.5);
    gl.bindVertexArray(flows.vao);
    gl.drawArrays(gl.POINTS, 0, flows.count);

    // Nodes
    gl.useProgram(progNode);
    setMat(progNode, 'uProj', proj);
    setMat(progNode, 'uView', view);
    setF(progNode, 'uTime', t);
    gl.bindVertexArray(nodesMesh.vao);
    gl.drawArrays(gl.POINTS, 0, nodesMesh.count);
    gl.disable(gl.BLEND);

    // Status HUD (synthetic network metrics)
    if(statusEl){
      const throughput = (0.6 + 0.4 * sync) * 100;
      const latency = 12 + (1.0 - sync) * 8;
      const util = 45 + 35 * (0.5 + 0.5 * Math.sin(t*0.7 + 0.6));
      const phase = Math.round(sync * 100);
      statusEl.textContent = 'STATUS: synced ' + phase + '% - traffic ' + util.toFixed(0) + '% - throughput ' + throughput.toFixed(0) + '% - latency ' + latency.toFixed(1) + 'ms';
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
