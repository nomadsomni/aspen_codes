<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nomad.Avalanche.Psync WebGL Matrix</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #050509;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eee;
    }
    #info {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
    }
    #container {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="info">NOMAD · AVALANCHE · OASIS · PSYNC · COMPLEX · SANDBOX — TRIAD WEB</div>
  <div id="container"></div>

  <!-- Three.js & OrbitControls from CDN -->
  <script src="https://unpkg.com/three@0.161.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.161.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    // ==== DATA ============================================================

    const NODES = [
      "NOMAD",
      "AVALANCHE",
      "OASIS",
      "PSYNC",
      "COMPLEX",
      "SANDBOX"
    ];

    // Sampled triads from your list (you can add more easily here):
    const TRIADS = [
      "Nomad.Avalanche",
      "Nomad.Avalanche.Psync",
      "Psync.Complex",
      "Oasis.Avalanche.Psync",
      "Avalanche.Complex.Psync",
      "Psync.Nomad",
      "Avalanche.Nomad.Oasis",
      "Oasis.Psync.Nomad",
      "Psync.Oasis.Nomad",
      "Avalanche.Psync.Nomad",
      "Avalanche.Oasis.Psync",
      "Avalanche.Psync.Oasis",
      "Nomad.Oasis.Avalanche",
      "Nomad.Psync.Avalanche",
      "Psync.Nomad.Oasis",
      "Psync.Oasis.Sandbox",
      "Nomad.Psync.Sandbox",
      "Oasis.Sandbox.Psync",
      "Oasis.Nomad.Psync",
      "Sandbox.Avalanche.Oasis",
      "Sandbox.Avalanche.Psync",
      "Sandbox.Nomad.Complex",
      "Sandbox.Complex.Psync",
      "Sandbox.Oasis.Psync",
      "Oasis.Psync.Avalanche",
      "Oasis.Complex.Sandbox",
      "Oasis.Nomad.Complex",
      "Nomad.Complex.Psync",
      "Psync.Complex.Sandbox",
      "Avalanche.Psync.Sandbox",
      "Avalanche.Nomad.Sandbox",
      "Avalanche.Nomad.Complex",
      "Oasis.Complex.Avalanche",
      "Oasis.Sandbox.Nomad",
      "Sandbox.Nomad.Avalanche",
      "Complex.Nomad.Avalanche",
      "Avalanche.Sandbox.Psync",
      "Avalanche.Sandbox.Nomad",
      "Sandbox.Complex.Oasis",
      "Nomad.Sandbox.Psync",
      "Nomad.Sandbox.Avalanche",
      "Oasis.Psync.Sandbox",
      "Psync.Nomad.Sandbox",
      "Sandbox.Psync.Nomad"
    ];

    // ==== SCENE SETUP =====================================================

    const container = document.getElementById("container");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050509);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 16);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio || 1);
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.rotateSpeed = 0.5;

    // Subtle fog for depth
    scene.fog = new THREE.FogExp2(0x050509, 0.05);

    // ==== LIGHTING ========================================================

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // ==== NODE POSITIONS ==================================================

    const nodeRadius = 6;
    const nodePositions = new Map();

    NODES.forEach((name, i) => {
      const angle = (i / NODES.length) * Math.PI * 2;
      const x = Math.cos(angle) * nodeRadius;
      const z = Math.sin(angle) * nodeRadius;
      const y = 0; // flat ring

      nodePositions.set(name.toUpperCase(), new THREE.Vector3(x, y, z));
    });

    // ==== HELPERS =========================================================

    function createNodeSphere(name, position, colorHex) {
      const geometry = new THREE.SphereGeometry(0.6, 32, 32);
      const material = new THREE.MeshStandardMaterial({
        color: colorHex,
        emissive: colorHex,
        emissiveIntensity: 0.4,
        metalness: 0.2,
        roughness: 0.4
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(position);
      mesh.userData.label = name;
      return mesh;
    }

    function createLabelSprite(text) {
      const canvas = document.createElement("canvas");
      const size = 256;
      canvas.width = size;
      canvas.height = size;

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, size, size);

      // Draw text
      ctx.fillStyle = "rgba(0,0,0,0)";
      ctx.fillRect(0, 0, size, size);
      ctx.font = "bold 64px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.fillText(text, size / 2, size / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(2.5, 2.5, 2.5);
      return sprite;
    }

    function createTriadLine(a, b, c, intensity = 1.0) {
      const points = [a, b, c, a]; // loop back to start

      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0x55e0ff,
        transparent: true,
        opacity: 0.15 + 0.2 * intensity
      });

      return new THREE.Line(geometry, material);
    }

    // ==== BUILD NODES =====================================================

    const group = new THREE.Group();
    scene.add(group);

    // Color mapping for vibes per node
    const nodeColors = {
      NOMAD: 0xffc857,
      AVALANCHE: 0xff3b3b,
      OASIS: 0x3bd8ff,
      PSYNC: 0xc53bff,
      COMPLEX: 0x9ea7ff,
      SANDBOX: 0x3bff8f
    };

    const nodeMeshes = new Map();

    NODES.forEach((name) => {
      const upper = name.toUpperCase();
      const pos = nodePositions.get(upper);
      const color = nodeColors[upper] || 0xffffff;
      const node = createNodeSphere(upper, pos, color);

      const label = createLabelSprite(upper);
      label.position.copy(pos).add(new THREE.Vector3(0, 1.4, 0));

      group.add(node);
      group.add(label);
      nodeMeshes.set(upper, node);
    });

    // ==== BUILD TRIADS ====================================================

    TRIADS.forEach((triadStr) => {
      const parts = triadStr
        .split(".")
        .map((p) => p.trim().toUpperCase())
        .filter((p) => p.length > 0);

      if (parts.length < 3) return;

      const a = nodePositions.get(parts[0]);
      const b = nodePositions.get(parts[1]);
      const c = nodePositions.get(parts[2]);

      if (!a || !b || !c) return;

      // Intensity tweak: triads involving SANDBOX or COMPLEX glow more
      let intensity = 1.0;
      if (parts.includes("SANDBOX") || parts.includes("COMPLEX")) {
        intensity = 1.5;
      }

      const line = createTriadLine(a, b, c, intensity);
      group.add(line);
    });

    // Subtle central core
    const coreGeo = new THREE.SphereGeometry(0.8, 24, 24);
    const coreMat = new THREE.MeshStandardMaterial({
      color: 0x00e0ff,
      emissive: 0x00e0ff,
      emissiveIntensity: 0.6,
      metalness: 0.7,
      roughness: 0.1
    });
    const core = new THREE.Mesh(coreGeo, coreMat);
    group.add(core);

    // ==== ANIMATION LOOP ==================================================

    let t = 0;

    function animate() {
      requestAnimationFrame(animate);

      t += 0.01;

      // Slow rotation
      group.rotation.y += 0.002;

      // Float core & pulse
      core.position.y = Math.sin(t * 1.3) * 0.4;
      core.material.emissiveIntensity = 0.5 + 0.2 * Math.sin(t * 2.0);

      // Slight breathing for PSYNC node
      const psync = nodeMeshes.get("PSYNC");
      if (psync) {
        const s = 1.0 + 0.12 * Math.sin(t * 3.0);
        psync.scale.set(s, s, s);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // ==== RESIZE HANDLER ==================================================

    window.addEventListener("resize", () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
  </script>
</body>
</html>
