<script>
(function(){
  const canvas = document.getElementById('gl');
  const gl = canvas.getContext('webgl2', { antialias:true, alpha:false });
  if(!gl){
    alert('WebGL2 not supported');
    return;
  }

  function resize(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.floor(canvas.clientWidth * dpr);
    const h = Math.floor(canvas.clientHeight * dpr);
    if(canvas.width !== w || canvas.height !== h){
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0,0,w,h);
    }
  }
  window.addEventListener('resize', resize);
  resize();

  function mat4Perspective(fovy, aspect, near, far){
    const f = 1/Math.tan(fovy/2);
    const nf = 1/(near-far);
    return [
      f/aspect,0,0,0,
      0,f,0,0,
      0,0,(far+near)*nf,-1,
      0,0,(2*far*near)*nf,0
    ];
  }
  function mat4LookAt(eye,center,up){
    const ex=eye[0],ey=eye[1],ez=eye[2];
    const cx=center[0],cy=center[1],cz=center[2];
    let zx=ex-cx, zy=ey-cy, zz=ez-cz;
    let len=Math.hypot(zx,zy,zz)||1; zx/=len; zy/=len; zz/=len;
    let xx=up[1]*zz-up[2]*zy;
    let xy=up[2]*zx-up[0]*zz;
    let xz=up[0]*zy-up[1]*zx;
    len=Math.hypot(xx,xy,xz)||1; xx/=len; xy/=len; xz/=len;
    let yx=zy*xz-zz*xy;
    let yy=zz*xx-zx*xz;
    let yz=zx*xy-zy*xx;
    return [
      xx, yx, zx, 0,
      xy, yy, zy, 0,
      xz, yz, zz, 0,
      -(xx*ex+xy*ey+xz*ez),
      -(yx*ex+yy*ey+yz*ez),
      -(zx*ex+zy*ey+zz*ez),
      1
    ];
  }

  const vsSphere = `#version 300 es
  layout(location=0) in vec3 aPos;
  layout(location=1) in vec3 aNor;
  uniform mat4 uProj;
  uniform mat4 uView;
  uniform mat4 uModel;
  out vec3 vNor;
  out vec3 vPos;
  void main(){
    vec4 worldPos = uModel * vec4(aPos,1.0);
    vPos = worldPos.xyz;
    vNor = mat3(uModel) * aNor;
    gl_Position = uProj * uView * worldPos;
  }`;
  const fsSphere = `#version 300 es
  precision highp float;
  in vec3 vNor;
  in vec3 vPos;
  out vec4 o;
  uniform vec3 uColor;
  uniform vec3 uEye;
  uniform float uEmissive;
  void main(){
    vec3 N = normalize(vNor);
    vec3 L = normalize(vec3(0.25,0.9,0.35));
    float diff = max(dot(N,L),0.0);
    vec3 V = normalize(uEye - vPos);
    vec3 H = normalize(L+V);
    float spec = pow(max(dot(N,H),0.0), 18.0) * 0.22;
    vec3 base = uColor * (0.30 + 0.55*diff) + spec;
    vec3 glow = uColor * uEmissive;
    o = vec4(base + glow, 1.0);
  }`;

  const vsLine = `#version 300 es
  layout(location=0) in vec3 aPos;
  uniform mat4 uProj;
  uniform mat4 uView;
  uniform mat4 uModel;
  void main(){
    gl_Position = uProj * uView * uModel * vec4(aPos,1.0);
  }`;
  const fsLine = `#version 300 es
  precision highp float;
  out vec4 o;
  uniform vec3 uColor;
  void main(){
    o = vec4(uColor, 1.0);
  }`;

  function compile(type, src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
      console.error(gl.getShaderInfoLog(s));
      throw new Error('Shader compile error');
    }
    return s;
  }
  function makeProgram(vsSrc, fsSrc){
    const p = gl.createProgram();
    gl.attachShader(p, compile(gl.VERTEX_SHADER, vsSrc));
    gl.attachShader(p, compile(gl.FRAGMENT_SHADER,fsSrc));
    gl.linkProgram(p);
    if(!gl.getProgramParameter(p, gl.LINK_STATUS)){
      console.error(gl.getProgramInfoLog(p));
      throw new Error('Program link error');
    }
    return p;
  }

  const progSphere = makeProgram(vsSphere, fsSphere);
  const progLine   = makeProgram(vsLine, fsLine);

  function makeSphere(radius, lat, lon){
    const pos=[], nor=[], idx=[];
    for(let y=0;y<=lat;y++){
      const v=y/lat, a1=v*Math.PI;
      for(let x=0;x<=lon;x++){
        const u=x/lon, a2=u*Math.PI*2.0;
        const sx=Math.sin(a1)*Math.cos(a2);
        const sy=Math.cos(a1);
        const sz=Math.sin(a1)*Math.sin(a2);
        pos.push(radius*sx, radius*sy, radius*sz);
        nor.push(sx,sy,sz);
      }
    }
    for(let y=0;y<lat;y++){
      for(let x=0;x<lon;x++){
        const i=y*(lon+1)+x;
        const i2=i+lon+1;
        idx.push(i, i+1, i2);
        idx.push(i+1, i2+1, i2);
      }
    }
    return {
      pos:new Float32Array(pos),
      nor:new Float32Array(nor),
      idx:new Uint16Array(idx)
    };
  }

  function makeVAO(vertices){
    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);
    const vbo = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(vertices), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0,3,gl.FLOAT,false,0,0);
    gl.bindVertexArray(null);
    return {vao, count: vertices.length/3};
  }

  const nodeSphere = makeVAO(makeSphere(0.6,18,28).pos); // we'll rebuild with normals below
  const nodeGeo = makeSphere(0.6,18,28);
  const nodeVAO = (function(geo){
    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);
    const vboPos = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vboPos);
    gl.bufferData(gl.ARRAY_BUFFER, geo.pos, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0,3,gl.FLOAT,false,0,0);
    const vboNor = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vboNor);
    gl.bufferData(gl.ARRAY_BUFFER, geo.nor, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(1);
    gl.vertexAttribPointer(1,3,gl.FLOAT,false,0,0);
    const ibo = gl.createBuffer();
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, geo.idx, gl.STATIC_DRAW);
    gl.bindVertexArray(null);
    return {vao, count: geo.idx.length};
  })(nodeGeo);

  const coreGeo = makeSphere(0.9,22,32);
  const coreVAO = (function(geo){
    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);
    const vboPos = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vboPos);
    gl.bufferData(gl.ARRAY_BUFFER, geo.pos, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0,3,gl.FLOAT,false,0,0);
    const vboNor = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vboNor);
    gl.bufferData(gl.ARRAY_BUFFER, geo.nor, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(1);
    gl.vertexAttribPointer(1,3,gl.FLOAT,false,0,0);
    const ibo = gl.createBuffer();
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, geo.idx, gl.STATIC_DRAW);
    gl.bindVertexArray(null);
    return {vao, count: geo.idx.length};
  })(coreGeo);

  function makeLines(vertices){ return makeVAO(vertices); }
  function makeTriangles(vertices){ return makeVAO(vertices); }

  const NODES = ["NOMAD","AVALANCHE","OASIS","PSYNC","COMPLEX","SANDBOX"];
  const nodeColors = {
    NOMAD:[1.00,0.88,0.55],
    AVALANCHE:[1.00,0.78,0.32],
    OASIS:[1.00,0.84,0.46],
    PSYNC:[1.00,0.90,0.60],
    COMPLEX:[0.98,0.82,0.50],
    SANDBOX:[1.00,0.86,0.52]
  };

  const TRIADS = [
    "Nomad.Avalanche","Nomad.Avalanche.Psync","Psync.Complex","Oasis.Avalanche.Psync",
    "Avalanche.Complex.Psync","Psync.Nomad","Avalanche.Nomad.Oasis","Oasis.Psync.Nomad",
    "Psync.Oasis.Nomad","Avalanche.Psync.Nomad","Avalanche.Oasis.Psync","Avalanche.Psync.Oasis",
    "Nomad.Oasis.Avalanche","Nomad.Psync.Avalanche","Psync.Nomad.Oasis","Psync.Oasis.Sandbox",
    "Nomad.Psync.Sandbox","Oasis.Sandbox.Psync","Oasis.Nomad.Psync","Sandbox.Avalanche.Oasis",
    "Sandbox.Avalanche.Psync","Sandbox.Nomad.Complex","Sandbox.Complex.Psync","Sandbox.Oasis.Psync",
    "Oasis.Psync.Avalanche","Oasis.Complex.Sandbox","Oasis.Nomad.Complex","Nomad.Complex.Psync",
    "Psync.Complex.Sandbox","Avalanche.Psync.Sandbox","Avalanche.Nomad.Sandbox","Avalanche.Nomad.Complex",
    "Oasis.Complex.Avalanche","Oasis.Sandbox.Nomad","Sandbox.Nomad.Avalanche","Complex.Nomad.Avalanche",
    "Avalanche.Sandbox.Psync","Avalanche.Sandbox.Nomad","Sandbox.Complex.Oasis","Nomad.Sandbox.Psync",
    "Nomad.Sandbox.Avalanche","Oasis.Psync.Sandbox","Psync.Nomad.Sandbox","Sandbox.Psync.Nomad"
  ];

  const nodeRadius = 6.0;
  const nodePositions = {};
  const nodeAngles = {};
  NODES.forEach((name,i)=>{
    const a = (i/NODES.length)*Math.PI*2;
    nodeAngles[name] = a;
    nodePositions[name] = [
      Math.cos(a)*nodeRadius,
      0.0,
      Math.sin(a)*nodeRadius
    ];
  });

  // Triad mesh
  const triadLines = [];
  const triadOffsets = [];
  TRIADS.forEach(str=>{
    const parts = str.split(".").map(s=>s.trim().toUpperCase());
    if(parts.length!==3)return;
    const A=nodePositions[parts[0]];
    const B=nodePositions[parts[1]];
    const C=nodePositions[parts[2]];
    if(!A||!B||!C)return;
    const startIndex = triadLines.length/3;
    triadOffsets.push(startIndex);
    triadLines.push(...A,...B,...C,...A);
  });
  const triadVAO = makeLines(triadLines);

  // ---------- MATRIX LABEL STRUCTURES WITH TEXT + DOTS ----------
  const plateData = {};
  const stemData  = {};
  const shardData = {};
  const sparkData = {};
  const textStrokeData = {};
  const textDotData = {};
  const conduitData = {};

  function letterSegments(ch){
    // Returns array of [x0,y0,x1,y1] in local cell coords [-0.5,0.5]
    const s = [];
    const t = 0.5, b = -0.5, l = -0.5, r = 0.5, m = 0.0;
    switch(ch){
      case 'N':
        s.push(l,b, l,t,  l,t, r,b);
        s.push(r,b, r,t);
        break;
      case 'O':
        s.push(l,b, l,t,  l,t, r,t,  r,t, r,b,  r,b, l,b);
        break;
      case 'M':
        s.push(l,b, l,t,  l,t, m,0.1,  m,0.1, r,t,  r,t, r,b);
        break;
      case 'A':
        s.push(l,b, m,t,  m,t, r,b,  l,0.0, r,0.0);
        break;
      case 'D':
        s.push(l,b, l,t,  l,t, m,t,  m,t, r,0.0,  r,0.0, m,b,  m,b, l,b);
        break;
      case 'V':
        s.push(l,t, m,b,  m,b, r,t);
        break;
      case 'L':
        s.push(l,t, l,b,  l,b, r,b);
        break;
      case 'C':
        s.push(r,t, l,t,  l,t, l,b,  l,b, r,b);
        break;
      case 'H':
        s.push(l,b, l,t,  r,b, r,t,  l,0.0, r,0.0);
        break;
      case 'E':
        s.push(r,t, l,t,  l,t, l,b,  l,b, r,b,  l,0.0, m,0.0);
        break;
      case 'I':
        s.push(l,t, r,t,  m,t, m,b,  l,b, r,b);
        break;
      case 'S':
        s.push(r,t, l,t,  l,t, l,0.1,  l,0.1, r,0.1,
               r,0.1, r,-0.3, r,-0.3, l,-0.3, l,-0.3, l,b, l,b, r,b);
        break;
      case 'P':
        s.push(l,b, l,t,  l,t, m,t, m,t, r,0.5, r,0.5, m,0.0, m,0.0, l,0.0);
        break;
      case 'Y':
        s.push(l,t, m,0.2,  r,t, m,0.2,  m,0.2, m,b);
        break;
      case 'X':
        s.push(l,b, r,t,  r,b, l,t);
        break;
      case 'B':
        s.push(l,b, l,t,  l,t, m,t, m,t, r,0.7, r,0.7, m,0.4,
               l,0.4, m,0.4, m,0.4, r,0.1, r,0.1, m,b, m,b, l,b);
        break;
      default:
        break;
    }
    return s;
  }

  function buildMatrixLabelForNode(name){
    const angle = nodeAngles[name];
    const basePos = nodePositions[name];

    const dirRad = [Math.cos(angle), 0, Math.sin(angle)];
    const dirTan = [-Math.sin(angle), 0, Math.cos(angle)];
    const up = [0,1,0];

    // Plate center slightly outward and above node
    const plateCenter = [
      basePos[0] + dirRad[0]*1.4,
      0.9,
      basePos[2] + dirRad[2]*1.4
    ];

    // ---- Plate geometry ----
    const height = 0.9;
    const wBottom = 2.2;
    const wTop = 1.4;

    function mix(a,b,t){ return a + (b-a)*t; }

    function makePlateVertex(side, ySign){
      const tt = (ySign > 0 ? 1.0 : 0.0);
      const w = mix(wBottom, wTop, tt);
      const halfW = w/2;
      const dx = dirTan[0]*halfW*side;
      const dz = dirTan[2]*halfW*side;
      const dy = (height/2)*ySign;
      return [plateCenter[0]+dx, plateCenter[1]+dy, plateCenter[2]+dz];
    }

    const pBL = makePlateVertex(-1, -1);
    const pBR = makePlateVertex( 1, -1);
    const pTR = makePlateVertex( 1,  1);
    const pTL = makePlateVertex(-1,  1);

    const plateVerts = [
      ...pBL, ...pBR, ...pTR,
      ...pBL, ...pTR, ...pTL
    ];
    plateData[name] = makeTriangles(plateVerts);

    // ---- Stem from node to plate ----
    const stemTop = [
      plateCenter[0],
      plateCenter[1] - height*0.52,
      plateCenter[2]
    ];
    const stemVerts = [
      basePos[0], basePos[1]+0.4, basePos[2],
      stemTop[0], stemTop[1], stemTop[2]
    ];
    stemData[name] = makeLines(stemVerts);

    // ---- Conduit line from plate into network center (for triad traffic) ----
    const conduitTarget = [
      plateCenter[0]*0.5,
      plateCenter[1]*0.5,
      plateCenter[2]*0.5
    ];
    const conduitVerts = [
      plateCenter[0], plateCenter[1], plateCenter[2],
      conduitTarget[0], conduitTarget[1], conduitTarget[2]
    ];
    conduitData[name] = makeLines(conduitVerts);

    // ---- Shards (random line fragments on plate) ----
    const shardVerts = [];
    const shardCount = 8;
    for(let i=0;i<shardCount;i++){
      const rx = (Math.random()*2-1)*0.7;
      const ry = (Math.random()*2-1)*0.3;
      const len = 0.35 + Math.random()*0.25;

      const baseX = plateCenter[0] + dirTan[0]*rx;
      const baseY = plateCenter[1] + ry;
      const baseZ = plateCenter[2] + dirTan[2]*rx;

      const endX = baseX + dirTan[0]*len*0.5;
      const endY = baseY;
      const endZ = baseZ + dirTan[2]*len*0.5;

      shardVerts.push(baseX,baseY,baseZ, endX,endY,endZ);
    }
    shardData[name] = makeLines(shardVerts);

    // ---- Sparks (zero-length lines as points) ----
    const sparkVerts = [];
    const sparkCount = 12;
    for(let i=0;i<sparkCount;i++){
      const rx = (Math.random()*2-1)*1.0;
      const rz = (Math.random()*2-1)*0.3;
      const ry = (Math.random()*2-1)*0.3;

      const baseX = plateCenter[0] + dirTan[0]*rx*0.6 + dirRad[0]*rz*0.3;
      const baseY = plateCenter[1] + ry*0.4;
      const baseZ = plateCenter[2] + dirTan[2]*rx*0.6 + dirRad[2]*rz*0.3;

      sparkVerts.push(baseX,baseY,baseZ, baseX,baseY,baseZ);
    }
    sparkData[name] = makeLines(sparkVerts);

    // ---- Text strokes (A: angular cyberline glyphs) ----
    const text = name;
    const charCount = text.length;
    const cellW = 0.7;
    const cellH = 0.7;
    const totalWidth = charCount * cellW;
    const baseOffset = -totalWidth/2 + cellW/2;

    const textVerts = [];
    for(let i=0;i<charCount;i++){
      const ch = text[i];
      const segs = letterSegments(ch);
      const charOffX = baseOffset + i*cellW;
      for(let j=0;j<segs.length;j+=4){
        const x0 = charOffX + segs[j+0]*cellW*0.5;
        const y0 = 0.0     + segs[j+1]*cellH*0.45;
        const x1 = charOffX + segs[j+2]*cellW*0.5;
        const y1 = 0.0     + segs[j+3]*cellH*0.45;

        const w0x = plateCenter[0] + dirTan[0]*x0 + up[0]*y0;
        const w0y = plateCenter[1] + y0;
        const w0z = plateCenter[2] + dirTan[2]*x0 + up[2]*y0;

        const w1x = plateCenter[0] + dirTan[0]*x1 + up[0]*y1;
        const w1y = plateCenter[1] + y1;
        const w1z = plateCenter[2] + dirTan[2]*x1 + up[2]*y1;

        textVerts.push(w0x,w0y,w0z, w1x,w1y,w1z);
      }
    }
    textStrokeData[name] = makeLines(textVerts);

    // ---- Dot-matrix cloud around text (C: particle text aura) ----
    const dotVerts = [];
    const dots = 40;
    for(let i=0;i<dots;i++){
      const ux = (Math.random()*2-1) * (totalWidth*0.55);
      const uy = (Math.random()*2-1) * 0.35;
      const baseX = plateCenter[0] + dirTan[0]*ux;
      const baseY = plateCenter[1] + uy;
      const baseZ = plateCenter[2] + dirTan[2]*ux;
      dotVerts.push(baseX,baseY,baseZ, baseX,baseY,baseZ);
    }
    textDotData[name] = makeLines(dotVerts);
  }

  NODES.forEach(buildMatrixLabelForNode);

  let yaw=0.5, pitch=0.25, dist=18;
  let isDown=false, px=0, py=0;

  canvas.addEventListener('mousedown',e=>{isDown=true;px=e.clientX;py=e.clientY;});
  window.addEventListener('mouseup',()=>{isDown=false;});
  window.addEventListener('mousemove',e=>{
    if(!isDown)return;
    const dx=(e.clientX-px)/canvas.clientWidth;
    const dy=(e.clientY-py)/canvas.clientHeight;
    yaw-=dx*3.0;
    pitch-=dy*2.0;
    pitch=Math.max(-1.3,Math.min(1.3,pitch));
    px=e.clientX;py=e.clientY;
  },{passive:true});
  canvas.addEventListener('wheel',e=>{
    dist*=(1+Math.sign(e.deltaY)*0.08);
    dist=Math.max(8,Math.min(40,dist));
    e.preventDefault();
  },{passive:false});

  function getEye(){
    const cx=0,cy=3,cz=0;
    const ex=cx+dist*Math.cos(pitch)*Math.cos(yaw);
    const ey=cy+dist*Math.sin(pitch);
    const ez=cz+dist*Math.cos(pitch)*Math.sin(yaw);
    return [ex,ey,ez];
  }

  // --- Codex & triad logic (same as before) ---
  const FACTIONS = {
    NOMAD: {
      title: "Nomad",
      tags: ["ROAMING","ROUTER","BRIDGE"],
      body: "Mobile signal-walker. Threads between nodes, carrying state and intent across the mesh."
    },
    AVALANCHE: {
      title: "Avalanche",
      tags: ["BURST","OVERLOAD","FLUX"],
      body: "Critical-mass cascade. When enough signals align, Avalanche collapses them into irreversible action."
    },
    OASIS: {
      title: "Oasis",
      tags: ["BUFFER","SANCTUARY","COOLDOWN"],
      body: "Calm zone in the noise. Catches heat from Avalanche and radiates it back as stable patterns."
    },
    PSYNC: {
      title: "Psync",
      tags: ["SYNC","PHASE","GLUE"],
      body: "Phase synchronizer. Aligns clocks, dreams, and threads. Where triads actually lock."
    },
    COMPLEX: {
      title: "Complex",
      tags: ["DEPTH","STACK","STATE"],
      body: "Deep system stack. Holds layered behavior, rules, and sub-protocols."
    },
    SANDBOX: {
      title: "Sandbox",
      tags: ["LAB","ISOLATION","EXPERIMENT"],
      body: "Quarantined lab-space. Unsafe ideas, speculative triads, shadow routes live here first."
    }
  };

  const codexTitle = document.getElementById('codex-title');
  const codexBody  = document.getElementById('codex-body');
  const codexTags  = document.getElementById('codex-tags');
  const codexList  = document.getElementById('codex-list');
  const triadLine  = document.getElementById('triad-line');
  const triadBtn   = document.getElementById('triad-btn');

  let selectedFaction = "NOMAD";
  let activeTriadNodes = [];
  let activeTriadIndex = -1;
  let triadFlashStart = 0;

  function renderCodexPills(){
    codexList.innerHTML = "";
    NODES.forEach(name=>{
      const pill = document.createElement('div');
      pill.className = 'codex-pill' + (name===selectedFaction ? ' active' : '');
      pill.textContent = name;
      pill.onclick = ()=>{
        selectedFaction = name;
        updateCodex();
      };
      codexList.appendChild(pill);
    });
  }

  function updateCodex(){
    const data = FACTIONS[selectedFaction];
    codexTitle.textContent = data.title.toUpperCase();
    codexBody.textContent  = data.body;
    codexTags.textContent  = data.tags.join(" · ");
    renderCodexPills();
  }

  function generateTriad(){
    const idx = Math.floor(Math.random()*TRIADS.length);
    const triadStr = TRIADS[idx];
    triadLine.textContent = "TRIAD: " + triadStr.replace(/\./g," · ");
    const parts = triadStr.split(".").map(s=>s.trim().toUpperCase());
    activeTriadNodes = parts;
    activeTriadIndex = idx;
    triadFlashStart = performance.now()*0.001;
  }

  triadBtn.addEventListener('click', generateTriad);
  updateCodex();

  gl.enable(gl.DEPTH_TEST);
  gl.enable(gl.CULL_FACE);
  gl.clearColor(0.01,0.005,0.02,1);

  let start = performance.now();
  function frame(now){
    const t = (now-start)*0.001;
    resize();
    gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);

    const eye = getEye();
    const aspect = canvas.width/canvas.height;
    const proj = mat4Perspective(50*Math.PI/180, aspect, 0.1, 200.0);
    const view = mat4LookAt(eye,[0,0,0],[0,1,0]);

    const rotY = t*0.2;
    const c = Math.cos(rotY), s = Math.sin(rotY);
    const modelGroup = [
      c,0,-s,0,
      0,1, 0,0,
      s,0, c,0,
      0,0, 0,1
    ];

    const flashAge = (t - triadFlashStart);
    const flashActive = flashAge < 3.0;
    const flashPhase = Math.max(0.0, 1.0 - flashAge/3.0);
    const triadPulse = flashActive ? (0.6 * flashPhase * (0.5 + 0.5*Math.sin(t*6.0))) : 0.0;

    // Triad mesh
    gl.useProgram(progLine);
    let loc = gl.getUniformLocation(progLine,'uProj');
    gl.uniformMatrix4fv(loc,false,new Float32Array(proj));
    loc = gl.getUniformLocation(progLine,'uView');
    gl.uniformMatrix4fv(loc,false,new Float32Array(view));
    loc = gl.getUniformLocation(progLine,'uModel');
    gl.uniformMatrix4fv(loc,false,new Float32Array(modelGroup));

    gl.uniform3f(gl.getUniformLocation(progLine,'uColor'),0.90,0.72,0.32);
    gl.bindVertexArray(triadVAO.vao);
    gl.drawArrays(gl.LINE_STRIP,0,triadVAO.count);

    if (flashActive && activeTriadIndex >= 0 && activeTriadIndex < triadOffsets.length){
      const startVert = triadOffsets[activeTriadIndex];
      const baseGold = [1.0,0.88,0.55];
      const boost = triadPulse;
      gl.uniform3f(
        gl.getUniformLocation(progLine,'uColor'),
        baseGold[0],
        baseGold[1] * (0.8 + 0.4*boost),
        baseGold[2] * (0.7 + 0.6*boost)
      );
      gl.drawArrays(gl.LINE_STRIP, startVert, 4);
    }

    // Matrix label structures (plates, stems, conduits, shards, sparks, strokes, dots)
    NODES.forEach(name=>{
      const isSelected = (name === selectedFaction);
      const isActive = (flashActive && activeTriadNodes.indexOf(name)!==-1);

      const basePlateColor = [0.90,0.72,0.32];
      const activeBoost = isActive ? (0.25 + 0.35*flashPhase) : (isSelected ? 0.15 : 0.0);

      // Plate
      gl.uniform3f(
        gl.getUniformLocation(progLine,'uColor'),
        basePlateColor[0] + activeBoost*0.5,
        basePlateColor[1] + activeBoost*0.3,
        basePlateColor[2] + activeBoost*0.1
      );
      gl.bindVertexArray(plateData[name].vao);
      gl.drawArrays(gl.TRIANGLES,0,plateData[name].count);

      // Stem
      gl.uniform3f(gl.getUniformLocation(progLine,'uColor'),1.0,0.9,0.6);
      gl.bindVertexArray(stemData[name].vao);
      gl.drawArrays(gl.LINES,0,stemData[name].count);

      // Conduit glow only when active (network traffic)
      if(isActive){
        const conduitGlow = 0.6 + 0.4*flashPhase;
        gl.uniform3f(
          gl.getUniformLocation(progLine,'uColor'),
          1.0,
          0.92*conduitGlow,
          0.75*conduitGlow
        );
        gl.bindVertexArray(conduitData[name].vao);
        gl.drawArrays(gl.LINES,0,conduitData[name].count);
      }

      // Glyph shards
      const shardPulse = isActive ? (0.4*flashPhase + 0.2*Math.sin(t*7.0)) : 0.12*Math.sin(t*3.5 + name.length);
      gl.uniform3f(
        gl.getUniformLocation(progLine,'uColor'),
        1.0,
        0.86 + shardPulse*0.3,
        0.6 + shardPulse*0.4
      );
      gl.bindVertexArray(shardData[name].vao);
      gl.drawArrays(gl.LINES,0,shardData[name].count);

      // Sparks
      const sparkPulse = 0.4 + 0.4*Math.sin(t*8.0 + name.length);
      gl.uniform3f(
        gl.getUniformLocation(progLine,'uColor'),
        1.0,
        0.92,
        0.72 + (isActive ? 0.2*flashPhase : 0.0)
      );
      gl.bindVertexArray(sparkData[name].vao);
      gl.drawArrays(gl.LINES,0,sparkData[name].count);

      // Text strokes (cyberline letters)
      const strokeBoost = isActive ? (0.35*flashPhase) : (isSelected ? 0.18 : 0.05);
      gl.uniform3f(
        gl.getUniformLocation(progLine,'uColor'),
        1.0,
        0.90 + strokeBoost*0.4,
        0.70 + strokeBoost*0.5
      );
      gl.bindVertexArray(textStrokeData[name].vao);
      gl.drawArrays(gl.LINES,0,textStrokeData[name].count);

      // Dot-matrix aura around text
      const dotPulse = 0.20 + 0.25*Math.sin(t*5.0 + name.length);
      gl.uniform3f(
        gl.getUniformLocation(progLine,'uColor'),
        1.0,
        0.88 + dotPulse*0.4,
        0.65 + dotPulse*0.4
      );
      gl.bindVertexArray(textDotData[name].vao);
      gl.drawArrays(gl.LINES,0,textDotData[name].count);
    });

    // Nodes
    gl.useProgram(progSphere);
    gl.uniformMatrix4fv(gl.getUniformLocation(progSphere,'uProj'),false,new Float32Array(proj));
    gl.uniformMatrix4fv(gl.getUniformLocation(progSphere,'uView'),false,new Float32Array(view));
    gl.uniform3f(gl.getUniformLocation(progSphere,'uEye'),eye[0],eye[1],eye[2]);

    gl.bindVertexArray(nodeVAO.vao);
    NODES.forEach(name=>{
      const basePos = nodePositions[name];
      const x = basePos[0]*c + basePos[2]*s;
      const z = -basePos[0]*s + basePos[2]*c;
      const y = basePos[1];

      const isPsync = (name==="PSYNC");
      let scale = isPsync ? (1.0 + 0.13*Math.sin(t*3.0)) : 1.0;

      if (name === selectedFaction){
        scale *= 1.10;
      }
      if (flashActive && activeTriadNodes.indexOf(name)!==-1){
        scale *= 1.22 + 0.06*Math.sin(t*6.0);
      }

      const model = [
        scale,0,0,0,
        0,scale,0,0,
        0,0,scale,0,
        x,y,z,1
      ];
      gl.uniformMatrix4fv(gl.getUniformLocation(progSphere,'uModel'),false,new Float32Array(model));
      const col = nodeColors[name];
      gl.uniform3f(gl.getUniformLocation(progSphere,'uColor'),col[0],col[1],col[2]);

      let emis = 0.18 + 0.12*Math.sin(t*2.1 + basePos[0]*0.18);
      if (flashActive && activeTriadNodes.indexOf(name)!==-1){
        emis += 0.35*flashPhase;
      }
      if (name === selectedFaction){
        emis += 0.10;
      }
      gl.uniform1f(gl.getUniformLocation(progSphere,'uEmissive'),emis);
      gl.drawElements(gl.TRIANGLES,nodeVAO.count,gl.UNSIGNED_SHORT,0);
    });

    // Core orb
    gl.bindVertexArray(coreVAO.vao);
    const coreScale = 1.0 + 0.11*Math.sin(t*2.3);
    const coreY = 0.4*Math.sin(t*1.4);
    const cs = coreScale;
    const coreModel = [
      cs,0,0,0,
      0,cs,0,0,
      0,0,cs,0,
      0,coreY,0,1
    ];
    gl.uniformMatrix4fv(gl.getUniformLocation(progSphere,'uModel'),false,new Float32Array(coreModel));
    gl.uniform3f(gl.getUniformLocation(progSphere,'uColor'),0.82,0.92,1.0);
    const emisCore = 0.8 + 0.35*Math.sin(t*3.2);
    gl.uniform1f(gl.getUniformLocation(progSphere,'uEmissive'),emisCore);
    gl.drawElements(gl.TRIANGLES,coreVAO.count,gl.UNSIGNED_SHORT,0);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
