      <stop offset="0%" stop-color="#3b1014"/>
      <stop offset="48%" stop-color="#101014"/>
      <stop offset="100%" stop-color="#060608"/>
    </radialGradient>
    <linearGradient id="goldRed" x1="0%" y1="0%" x2="100%" y2="100%">
