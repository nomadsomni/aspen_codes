<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nomad.Avalanche.Psync WebGL Matrix — WORKING CDNJS</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #050509;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eee;
    }
    #info {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
    }
    #container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="info">NOMAD · AVALANCHE · OASIS · PSYNC · COMPLEX · SANDBOX — TRIAD WEB</div>
  <div id="container"></div>

  <!-- FIXED CDN VERSIONS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/examples/js/controls/OrbitControls.js"></script>

  <script>
    // ORIGINAL SCRIPT UNTOUCHED (only CDN changed)

    const NODES = ["NOMAD","AVALANCHE","OASIS","PSYNC","COMPLEX","SANDBOX"];

    const TRIADS = [
      "Nomad.Avalanche","Nomad.Avalanche.Psync","Psync.Complex","Oasis.Avalanche.Psync",
      "Avalanche.Complex.Psync","Psync.Nomad","Avalanche.Nomad.Oasis","Oasis.Psync.Nomad",
      "Psync.Oasis.Nomad","Avalanche.Psync.Nomad","Avalanche.Oasis.Psync","Avalanche.Psync.Oasis",
      "Nomad.Oasis.Avalanche","Nomad.Psync.Avalanche","Psync.Nomad.Oasis","Psync.Oasis.Sandbox",
      "Nomad.Psync.Sandbox","Oasis.Sandbox.Psync","Oasis.Nomad.Psync","Sandbox.Avalanche.Oasis",
      "Sandbox.Avalanche.Psync","Sandbox.Nomad.Complex","Sandbox.Complex.Psync","Sandbox.Oasis.Psync",
      "Oasis.Psync.Avalanche","Oasis.Complex.Sandbox","Oasis.Nomad.Complex","Nomad.Complex.Psync",
      "Psync.Complex.Sandbox","Avalanche.Psync.Sandbox","Avalanche.Nomad.Sandbox","Avalanche.Nomad.Complex",
      "Oasis.Complex.Avalanche","Oasis.Sandbox.Nomad","Sandbox.Nomad.Avalanche","Complex.Nomad.Avalanche",
      "Avalanche.Sandbox.Psync","Avalanche.Sandbox.Nomad","Sandbox.Complex.Oasis","Nomad.Sandbox.Psync",
      "Nomad.Sandbox.Avalanche","Oasis.Psync.Sandbox","Psync.Nomad.Sandbox","Sandbox.Psync.Nomad"
    ];

    const container = document.getElementById("container");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050509);

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 16);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio || 1);
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.fog = new THREE.FogExp2(0x050509, 0.05);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(5, 10, 7);
    scene.add(dir);

    const nodeRadius = 6;
    const nodePositions = new Map();
    NODES.forEach((name, i) => {
      const angle = (i / NODES.length) * Math.PI * 2;
      nodePositions.set(name.toUpperCase(), new THREE.Vector3(
        Math.cos(angle) * nodeRadius,
        0,
        Math.sin(angle) * nodeRadius
      ));
    });

    function createNodeSphere(name, pos, colorHex) {
      const geo = new THREE.SphereGeometry(0.6, 32, 32);
      const mat = new THREE.MeshStandardMaterial({
        color: colorHex,
        emissive: colorHex,
        emissiveIntensity: 0.4,
        metalness: 0.2,
        roughness: 0.4
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(pos);
      return mesh;
    }

    function createLabelSprite(text) {
      const canvas = document.createElement("canvas");
      canvas.width = 256; canvas.height = 256;
      const ctx = canvas.getContext("2d");
      ctx.font = "bold 64px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.fillText(text, 128, 128);
      const texture = new THREE.CanvasTexture(canvas);
      return new THREE.Sprite(new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      }));
    }

    function createTriadLine(a, b, c, intensity) {
      const geo = new THREE.BufferGeometry().setFromPoints([a, b, c, a]);
      const mat = new THREE.LineBasicMaterial({
        color: 0x55e0ff,
        transparent: true,
        opacity: 0.15 + 0.2 * intensity
      });
      return new THREE.Line(geo, mat);
    }

    const group = new THREE.Group();
    scene.add(group);

    const nodeColors = {
      NOMAD: 0xffc857, AVALANCHE: 0xff3b3b, OASIS: 0x3bd8ff,
      PSYNC: 0xc53bff, COMPLEX: 0x9ea7ff, SANDBOX: 0x3bff8f
    };

    const nodeMeshes = new Map();

    NODES.forEach(name => {
      const upper = name.toUpperCase();
      const pos = nodePositions.get(upper);
      const color = nodeColors[upper];

      const sphere = createNodeSphere(upper, pos, color);
      group.add(sphere);
      nodeMeshes.set(upper, sphere);

      const label = createLabelSprite(upper);
      label.scale.set(2.5,2.5,2.5);
      label.position.copy(pos).add(new THREE.Vector3(0, 1.4, 0));
      group.add(label);
    });

    TRIADS.forEach(t => {
      const parts = t.split(".").map(p => p.trim().toUpperCase());
      if (parts.length !== 3) return;
      const A = nodePositions.get(parts[0]);
      const B = nodePositions.get(parts[1]);
      const C = nodePositions.get(parts[2]);
      if (!A || !B || !C) return;
      const intensity = (parts.includes("SANDBOX") || parts.includes("COMPLEX")) ? 1.5 : 1.0;
      group.add(createTriadLine(A, B, C, intensity));
    });

    const core = new THREE.Mesh(
      new THREE.SphereGeometry(0.8, 24, 24),
      new THREE.MeshStandardMaterial({
        color: 0x00e0ff,
        emissive: 0x00e0ff,
        emissiveIntensity: 0.6,
        metalness: 0.7,
        roughness: 0.1
      })
    );
    group.add(core);

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.01;
      group.rotation.y += 0.002;
      core.position.y = Math.sin(t * 1.3) * 0.4;
      core.material.emissiveIntensity = 0.5 + 0.2 * Math.sin(t * 2.0);
      const ps = nodeMeshes.get("PSYNC");
      if (ps) {
        const s = 1.0 + 0.12 * Math.sin(t * 3);
        ps.scale.set(s,s,s);
      }
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    onresize = () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    };
  </script>
</body>
</html>
